<!DOCTYPE html>
<html>
<head>
    <title>Private Photo Vault</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            color: white;
        }
        
        .header {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .google-btn {
            background: white;
            color: #444;
            padding: 12px 30px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 600;
            transition: 0.3s;
        }
        
        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,210,255,0.4);
        }
        
        .google-btn img {
            width: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 100px auto 40px;
            padding: 20px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 40px;
        }
        
        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
        }
        
        .upload-section {
            background: rgba(255,255,255,0.1);
            border: 2px dashed #00d2ff;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin: 20px 0;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .upload-section:hover {
            background: rgba(0,210,255,0.1);
        }
        
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .photo-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
        }
        
        .photo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,210,255,0.3);
        }
        
        .photo-thumbnail {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .photo-info {
            padding: 15px;
        }
        
        .photo-name {
            color: #00d2ff;
            font-weight: 600;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-image {
            max-width: 90%;
            max-height: 80vh;
            border-radius: 10px;
        }
        
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }
        
        .download-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #00d2ff;
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            display: none;
            animation: slideIn 0.3s;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">🔒 Private Photo Vault</div>
            <div id="authSection">
                <button class="google-btn" onclick="window.location.href='http://localhost:3000/auth/google'" id="loginBtn">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
                    <span>Google Login</span>
                </button>
                <div class="user-info" id="userInfo" style="display:none">
                    <img src="" class="user-avatar" id="userAvatar">
                    <span id="userName"></span>
                    <button onclick="logout()" style="background:none; border:none; color:#ff6b6b; cursor:pointer">Logout</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div id="dashboard" style="display:none">
            <div class="upload-section" onclick="uploadPhotos()">
                <h2>📤 Click to Upload Photos</h2>
                <p>Upload to your private vault</p>
            </div>
            <div class="photo-grid" id="photoGrid"></div>
        </div>
        
        <div id="welcomeScreen" style="text-align:center; margin-top:100px">
            <h1>👋 Welcome to Private Photo Vault</h1>
            <p style="color:rgba(255,255,255,0.7)">Login with Google to access your private photos</p>
        </div>
    </div>
    
    <div class="modal" id="imageModal">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <img src="" class="modal-image" id="modalImage">
        <button class="download-btn" onclick="downloadCurrentImage()">📥 Download</button>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        let currentUser = null;
        let currentImageUrl = '';
        
        window.onload = async function() {
            try {
                const res = await fetch('http://localhost:3000/auth/status', { credentials: 'include' });
                const data = await res.json();
                if (data.loggedIn) {
                    currentUser = data.user;
                    document.getElementById('welcomeScreen').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    document.getElementById('loginBtn').style.display = 'none';
                    document.getElementById('userInfo').style.display = 'flex';
                    document.getElementById('userName').textContent = currentUser.name;
                    document.getElementById('userAvatar').src = currentUser.photo || 'https://via.placeholder.com/35';
                    loadPhotos();
                }
            } catch(e) { console.error(e); }
        };
        
        async function loadPhotos() {
            try {
                const res = await fetch('http://localhost:3000/api/photos', { credentials: 'include' });
                const data = await res.json();
                if (data.photos) {
                    const grid = document.getElementById('photoGrid');
                    if (data.photos.length === 0) {
                        grid.innerHTML = '<div style="text-align:center; padding:50px">No photos yet. Upload some!</div>';
                    } else {
                        grid.innerHTML = data.photos.map(p => `
                            <div class="photo-card" onclick="openModal('${p.webContentLink}')">
                                <img src="${p.thumbnailLink || 'https://via.placeholder.com/300'}" class="photo-thumbnail">
                                <div class="photo-info">
                                    <div class="photo-name">${p.name}</div>
                                    <div>${new Date(p.createdTime).toLocaleDateString()}</div>
                                </div>
                            </div>
                        `).join('');
                    }
                }
            } catch(e) { showToast('Error loading photos'); }
        }
        
        function uploadPhotos() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.multiple = true;
            input.onchange = async function(e) {
                for (let file of e.target.files) {
                    try {
                        await fetch('http://localhost:3000/api/upload', {
                            method: 'POST',
                            credentials: 'include',
                            headers: { 'Content-Type': file.type },
                            body: await file.arrayBuffer()
                        });
                        showToast(`${file.name} uploaded!`);
                    } catch(e) { showToast('Upload failed'); }
                }
                loadPhotos();
            };
            input.click();
        }
        
        function openModal(url) {
            currentImageUrl = url;
            document.getElementById('modalImage').src = url;
            document.getElementById('imageModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('imageModal').classList.remove('active');
        }
        
        function downloadCurrentImage() {
            window.open(currentImageUrl, '_blank');
        }
        
        async function logout() {
            await fetch('http://localhost:3000/auth/logout', { credentials: 'include' });
            window.location.reload();
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
